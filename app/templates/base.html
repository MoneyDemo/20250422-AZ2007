<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Animate.css for animations -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css" />
    <title>{% block title %}News App{% endblock %}</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --navbar-bg: #f8f9fa;
            --link-color: #ff5722;
        }

        .dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --navbar-bg: #1f1f1f;
            --link-color: #ffab40;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .navbar {
            background-color: var(--navbar-bg) !important;
        }

        .navbar-brand {
            font-weight: bold;
            color: var(--link-color) !important;
        }

        .nav-link {
            color: var(--text-color) !important;
        }

        .nav-link:hover {
            color: var(--link-color) !important;
        }

        .category-card {
            transition: transform 0.2s;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .dark-mode .category-card {
            background: #232323;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .article-card {
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">NewsApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% for key, info in categories.items() %}
                    <li class="nav-item">
                        <a class="nav-link" href="/{{ key }}">{{ info.label }}</a>
                    </li>
                    {% endfor %}
                    <li class="nav-item">
                        <button id="theme-toggle" class="btn btn-link nav-link" aria-label="Toggle dark mode">
                            <i class="fas fa-moon" id="theme-icon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Theme toggle script -->
    <script>
        /**
         * Apply stored theme on load
         */
        document.addEventListener('DOMContentLoaded', function() {
            const userTheme = localStorage.getItem('theme');
            if (userTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            }
        });

        /**
         * Toggle between light and dark modes
         */
        document.getElementById('theme-toggle').addEventListener('click', function() {
            const root = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (root.classList.toggle('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                localStorage.setItem('theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        });
    </script>
</body>

</html>
